name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: src

      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: builds
          path: builds

      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3 $GITHUB_WORKSPACE/builds/plugins.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          shopt -s globstar nullglob
          for f in extensions/**/build/*.cs3; do
            [ -e "$f" ] && cp "$f" $GITHUB_WORKSPACE/builds
          done
          cp build/plugins.json $GITHUB_WORKSPACE/builds/plugins.json

      - name: Verify build artifacts
        run: |
          echo "=== plugins.json ==="
          cat $GITHUB_WORKSPACE/builds/plugins.json
          echo "=== .cs3 files ==="
          ls -la $GITHUB_WORKSPACE/builds/*.cs3 || { echo "ERROR: No .cs3 files found"; exit 1; }

      - name: Push builds branch
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
